<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>Expense Tracker</h1>
            <p>Professional expense management and tracking</p>
        </header>

        <!-- Main Content -->
        <main>
            <!-- Form Section -->
            <section class="form-section">
                <h2>Add New Expense</h2>
                <form id="expenseForm">
                    <div class="form-group">
                        <label for="expenseName">Expense Name:</label>
                        <input 
                            type="text" 
                            id="expenseName" 
                            placeholder="e.g., Groceries, Gas, Rent"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="expenseAmount">Amount (₹):</label>
                        <input 
                            type="number" 
                            id="expenseAmount" 
                            placeholder="0.00"
                            min="0"
                            step="0.01"
                            required
                        >
                    </div>

                    <button type="submit" class="btn-add">Add Expense</button>
                </form>
            </section>

            <!-- Total Section -->
            <section class="total-section">
                <div class="total-box">
                    <h3>Total Expenses</h3>
                    <p class="total-amount" id="totalAmount">₹0.00</p>
                </div>
            </section>

            <!-- Expenses List Section -->
            <section class="list-section">
                <h2>Your Expenses</h2>
                <div id="expensesList" class="expenses-list">
                    <p class="empty-message">No expenses yet. Add one to get started!</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Script -->
    <script src="script.js"></script>
</body>
</html>
